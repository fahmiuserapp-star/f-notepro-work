            </form>
        </div>
    </div>

    <!-- ==================== IMAGE VIEWER ==================== -->
    <div id="imageViewer" class="image-viewer-overlay" onclick="closeImageViewer()">
        <div class="image-viewer-content" onclick="event.stopPropagation()">
            <button class="image-viewer-close" onclick="closeImageViewer()"><i class="fa-solid fa-xmark"></i></button>
            <img id="viewerImage" src="" alt="صورة">
            <div class="image-viewer-switch" id="viewerSwitch">
                <button class="active" data-type="guide" onclick="switchViewerImage('guide')">صورة المرشد</button>
                <button data-type="vehicle" onclick="switchViewerImage('vehicle')">صورة الحافلة</button>
            </div>
        </div>
    </div>

    <!-- ==================== TOAST CONTAINER ==================== -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ==================== FIREBASE CONFIG ====================
        const firebaseConfig = {
            apiKey: "AIzaSyAJLpdRoKamaHHofnCh4qQk6mHKeI25Tgc",
            authDomain: "f-notepro-work.firebaseapp.com",
            databaseURL: "https://f-notepro-work-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "f-notepro-work",
            storageBucket: "f-notepro-work.firebasestorage.app",
            messagingSenderId: "645688115664",
            appId: "1:645688115664:web:5dbfee1e28c41e0a1c79d5",
            measurementId: "G-SS24M0LZN2"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ==================== CLOUDINARY CONFIG ====================
        const CLOUDINARY_CLOUD_NAME = 'dmhtx93nj';
        const CLOUDINARY_UPLOAD_PRESET = 'ml_default';

        // ==================== APP STATE ====================
        let currentUser = null;
        let guides = [];
        let currentFeedIndex = 0;
        let startY = 0;
        let isDragging = false;
        let currentScreen = 'feed';
        let uploadedGuideImage = '';
        let uploadedVehicleImage = '';
        let currentUploadTarget = 'guide';
        let recognition = null;
        let pendingDeleteId = null;
        let currentViewerGuide = null;
        let currentViewerType = 'guide';
        let activeColorFilter = 'all';
        let settings = {
            darkMode: true,
            animations: true,
            voiceSearch: true
        };

        // ==================== AUTH FUNCTIONS ====================
        let isLoginMode = true;

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('authSubmitBtn').textContent = isLoginMode ? 'تسجيل الدخول' : 'إنشاء حساب';
            document.getElementById('authToggle').innerHTML = isLoginMode ?
                'ليس لديك حساب؟ <span onclick="toggleAuthMode()">إنشاء حساب جديد</span>' :
                'لديك حساب بالفعل؟ <span onclick="toggleAuthMode()">تسجيل الدخول</span>';
        }

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            const errorEl = document.getElementById('authError');
            try {
                errorEl.classList.remove('show');
                if (isLoginMode) {
                    await auth.signInWithEmailAndPassword(email, password);
                } else {
                    await auth.createUserWithEmailAndPassword(email, password);
                }
            } catch (error) {
                errorEl.textContent = getArabicError(error.code);
                errorEl.classList.add('show');
            }
        });

        function getArabicError(code) {
            const m = {
                'auth/email-already-in-use': 'البريد الإلكتروني مستخدم بالفعل',
                'auth/invalid-email': 'البريد الإلكتروني غير صالح',
                'auth/weak-password': 'كلمة المرور ضعيفة (6 أحرف على الأقل)',
                'auth/user-not-found': 'المستخدم غير موجود',
                'auth/wrong-password': 'كلمة المرور غير صحيحة',
                'auth/too-many-requests': 'محاولات كثيرة، الرجاء المحاولة لاحقاً'
            };
            return m[code] || 'حدث خطأ، الرجاء المحاولة مرة أخرى';
        }

        function logout() {
            auth.signOut();
            closeSettings();
        }

        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('appContainer').classList.remove('hidden');
                loadGuides();
            } else {
                currentUser = null;
                document.getElementById('authScreen').classList.remove('hidden');
                document.getElementById('appContainer').classList.add('hidden');
            }
        });

        // ==================== SETTINGS ====================
        function openSettings() {
            document.getElementById('settingsPanel').classList.add('open');
            document.getElementById('settingsBackdrop').classList.add('show');
        }

        function closeSettings() {
            document.getElementById('settingsPanel').classList.remove('open');
            document.getElementById('settingsBackdrop').classList.remove('show');
        }

        function toggleSetting(key) {
            settings[key] = !settings[key];
            const toggle = document.getElementById(key + 'Toggle');
            if (settings[key]) {
                toggle.classList.add('active');
            } else {
                toggle.classList.remove('active');
            }
            showToast(`تم ${settings[key] ? 'تفعيل' : 'إلغاء'} الإعداد`, 'success');
        }

        // ==================== LOAD GUIDES ====================
        function loadGuides() {
            const feedStack = document.getElementById('feedStack');
            feedStack.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';
            db.collection('guides').where('userId', '==', currentUser.uid).orderBy('createdAt', 'desc')
                .onSnapshot((snapshot) => {
                    guides = [];
                    snapshot.forEach((doc) => guides.push({ id: doc.id, ...doc.data() }));
                    renderFeed();
                }, (error) => {
                    feedStack.innerHTML =
                        `<div class="empty-state"><div class="empty-icon"><i class="fa-solid fa-triangle-exclamation"></i></div><h3>خطأ في التحميل</h3><p>تحقق من اتصال الإنترنت</p></div>`;
                });
        }

        // ==================== RENDER FEED ====================
        function renderFeed() {
            const feedStack = document.getElementById('feedStack');
            if (guides.length === 0) {
                feedStack.innerHTML =
                    `<div class="empty-state"><div class="empty-icon"><i class="fa-solid fa-users-slash"></i></div><h3>لا يوجد مرشدين</h3><p>اضغط على <span style="color: var(--primary);">+</span> لإضافة أول مرشد</p></div>`;
                return;
            }
            feedStack.innerHTML = guides.map((guide, index) => `
                <div class="guide-card" style="background-image: url('${guide.image || guide.guideImage || 'https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=800&q=80'}')" data-index="${index}" data-id="${guide.id}">
                    <div class="card-overlay"></div>
                    <div class="card-top-badge">
                        ${guide.isFavorite ? `<div class="card-badge favorite-badge"><i class="fa-solid fa-star"></i> مفضل</div>` : ''}
                        <div class="card-badge" onclick="event.stopPropagation(); editGuide('${guide.id}')"><i class="fa-solid fa-pen-to-square"></i> تعديل</div>
                    </div>
                    ${guide.vehicleImage ? `
                    <div class="card-vehicle-badge">
                        <div class="vehicle-thumb" style="background-image: url('${guide.vehicleImage}')" onclick="event.stopPropagation(); openImageViewer('${guide.id}', 'vehicle')" title="صورة الحافلة"></div>
                    </div>` : ''}
                    ${guide.image || guide.guideImage ? `
                    <div class="card-vehicle-badge" style="top: ${guide.vehicleImage ? '190px' : '110px'};">
                        <div class="vehicle-thumb" style="background-image: url('${guide.image || guide.guideImage}')" onclick="event.stopPropagation(); openImageViewer('${guide.id}', 'guide')" title="صورة المرشد"></div>
                    </div>` : ''}
                    <div class="card-content">
                        <div class="guide-info">
                            <h2 class="guide-name">${guide.name}</h2>
                            <div class="guide-meta">
                                ${guide.license ? `<span class="meta-badge"><i class="fa-solid fa-id-card"></i> ${guide.license}</span>` : ''}
                                <span class="meta-badge lang-badge"><i class="fa-solid fa-language"></i> ${guide.language || 'العربية'}</span>
                            </div>
                            ${guide.notes ? `<p class="guide-notes">${guide.notes}</p>` : ''}
                        </div>
                        <div class="action-buttons">
                            <button class="action-btn favorite ${guide.isFavorite ? 'active' : ''}" onclick="event.stopPropagation(); toggleFavorite('${guide.id}', ${index})">
                                <div class="btn-icon"><i class="fa-solid fa-star"></i></div><span class="btn-label">مفضل</span>
                            </button>
                            <button class="action-btn whatsapp" onclick="event.stopPropagation(); openWhatsApp('${guide.phone}')">
                                <div class="btn-icon"><i class="fa-brands fa-whatsapp"></i></div><span class="btn-label">واتساب</span>
                            </button>
                            <button class="action-btn call" onclick="event.stopPropagation(); callGuide('${guide.phone}')">
                                <div class="btn-icon"><i class="fa-solid fa-phone"></i></div><span class="btn-label">اتصال</span>
                            </button>
                            <button class="action-btn share" onclick="event.stopPropagation(); shareGuide('${guide.id}')">
                                <div class="btn-icon"><i class="fa-solid fa-share-nodes"></i></div><span class="btn-label">مشاركة</span>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
            currentFeedIndex = 0;
            updateFeedPosition();
            setupSwipeGestures();
        }

        // ==================== SWIPE GESTURES ====================
        function setupSwipeGestures() {
            const feedStack = document.getElementById('feedStack');
            const newFeedStack = feedStack.cloneNode(true);
            feedStack.parentNode.replaceChild(newFeedStack, feedStack);
            newFeedStack.addEventListener('touchstart', handleTouchStart, { passive: false });
            newFeedStack.addEventListener('touchmove', handleTouchMove, { passive: false });
            newFeedStack.addEventListener('touchend', handleTouchEnd);
            newFeedStack.addEventListener('mousedown', handleMouseDown);
            window.addEventListener('mousemove', handleMouseMove);
            window.addEventListener('mouseup', handleMouseUp);
        }

        function handleTouchStart(e) { if (!guides.length) return;
            startY = e.touches[0].clientY;
            isDragging = true;
            document.getElementById('feedStack').style.transition = 'none'; }

        function handleTouchMove(e) { if (!isDragging || !guides.length) return; const d = e.touches[0].clientY -
                startY;
            document.getElementById('feedStack').style.transform =
            `translateY(${-currentFeedIndex * window.innerHeight + d * 0.6}px)`; }

        function handleTouchEnd(e) { if (!isDragging || !guides.length) return;
            isDragging = false; const fs = document.getElementById('feedStack');
            fs.style.transition = 'transform 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
            handleSwipeEnd(e.changedTouches[0].clientY - startY); }

        function handleMouseDown(e) { if (!guides.length) return;
            startY = e.clientY;
            isDragging = true;
            document.getElementById('feedStack').style.transition = 'none';
            document.getElementById('feedStack').style.cursor = 'grabbing'; }

        function handleMouseMove(e) { if (!isDragging || !guides.length) return; const d = e.clientY - startY;
            document.getElementById('feedStack').style.transform =
            `translateY(${-currentFeedIndex * window.innerHeight + d * 0.6}px)`; }

        function handleMouseUp(e) { if (!isDragging || !guides.length) return;
            isDragging = false; const fs = document.getElementById('feedStack');
            fs.style.transition = 'transform 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
            fs.style.cursor = 'grab';
            handleSwipeEnd(e.clientY - startY); }

        function handleSwipeEnd(d) { if (Math.abs(d) > 70) { if (d > 0 && currentFeedIndex > 0) currentFeedIndex--; else if (
                d < 0 && currentFeedIndex < guides.length - 1) currentFeedIndex++; }
            updateFeedPosition(); }

        function updateFeedPosition() { document.getElementById('feedStack').style.transform =
            `translateY(-${currentFeedIndex * window.innerHeight}px)`; }

        // ==================== SCREENS ====================
        function switchScreen(screen) {
            currentScreen = screen;
            document.getElementById('feedScreen').classList.toggle('active', screen === 'feed');
            document.getElementById('searchScreen').classList.toggle('active', screen === 'search');
            if (screen === 'search') setTimeout(() => document.getElementById('searchInput').focus(), 300);
            document.querySelectorAll('.nav-item[data-screen]').forEach(item => item.classList.toggle('active', item
                .dataset.screen === screen));
        }

        // ==================== MODAL ====================
        function openAddModal() {
            resetForm();
            document.getElementById('modalTitle').textContent = 'إضافة مرشد جديد';
            document.getElementById('deleteGuideBtn').style.display = 'none';
            document.getElementById('deleteConfirm').classList.remove('show');
            document.getElementById('addModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeAddModal() { document.getElementById('addModal').classList.remove('active');
            document.body.style.overflow = '';
            resetForm(); }

        function resetForm() {
            document.getElementById('addGuideForm').reset();
            document.getElementById('editGuideId').value = '';
            uploadedGuideImage = '';
            uploadedVehicleImage = '';
            pendingDeleteId = null;
            ['guideImageUpload', 'vehicleImageUpload'].forEach(id => {
                const el = document.getElementById(id);
                el.classList.remove('has-image');
                el.style.backgroundImage = '';
                el.innerHTML =
                    `${id === 'guideImageUpload' ? '<i class="fa-solid fa-user"></i><span>صورة المرشد</span>' : '<i class="fa-solid fa-bus"></i><span>صورة الحافلة</span>'}<div class="image-change-badge"><i class="fa-solid fa-camera"></i></div>`;
            });
            document.getElementById('deleteConfirm').classList.remove('show');
            document.getElementById('deleteGuideBtn').style.display = 'none';
        }

        function editGuide(guideId) {
            const guide = guides.find(g => g.id === guideId);
            if (!guide) return;
            document.getElementById('editGuideId').value = guideId;
            document.getElementById('guideName').value = guide.name || '';
            document.getElementById('guidePhone').value = guide.phone || '';
            document.getElementById('guideLicense').value = guide.license || '';
            document.getElementById('guideLanguage').value = guide.language || 'العربية';
            document.getElementById('guideNotes').value = guide.notes || '';
            uploadedGuideImage = guide.image || guide.guideImage || '';
            uploadedVehicleImage = guide.vehicleImage || '';
            updateImagePreview('guideImageUpload', uploadedGuideImage, 'guide');
            updateImagePreview('vehicleImageUpload', uploadedVehicleImage, 'vehicle');
            document.getElementById('modalTitle').textContent = 'تعديل المرشد';
            document.getElementById('deleteGuideBtn').style.display = 'block';
            document.getElementById('deleteConfirm').classList.remove('show');
            document.getElementById('addModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function updateImagePreview(elId, url, type) {
            const el = document.getElementById(elId);
            if (url) { el.style.backgroundImage = `url(${url})`;
                el.classList.add('has-image');
                el.innerHTML =
                '<div class="image-change-badge"><i class="fa-solid fa-camera"></i> تغيير</div>'; } else { el
                    .classList.remove('has-image');
                el.style.backgroundImage = '';
                el.innerHTML =
                    `${type === 'guide' ? '<i class="fa-solid fa-user"></i><span>صورة المرشد</span>' : '<i class="fa-solid fa-bus"></i><span>صورة الحافلة</span>'}<div class="image-change-badge"><i class="fa-solid fa-camera"></i></div>`; }
        }

        function showDeleteConfirm() { document.getElementById('deleteConfirm').classList.add('show');
            pendingDeleteId = document.getElementById('editGuideId').value; }

        function cancelDelete() { document.getElementById('deleteConfirm').classList.remove('show');
            pendingDeleteId = null; }

        async function confirmDelete() { if (!pendingDeleteId) return; try { await db.collection('guides').doc(
                pendingDeleteId).delete();
            showToast('تم حذف المرشد', 'success');
            closeAddModal();
            switchScreen('feed'); } catch (e) { showToast('خطأ في الحذف', 'error'); }
            pendingDeleteId = null; }

        // ==================== SAVE GUIDE ====================
        async function saveGuide(e) {
            e.preventDefault();
            const btn = document.getElementById('submitGuideBtn');
            const editId = document.getElementById('editGuideId').value;
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري الحفظ...';
            const data = {
                name: document.getElementById('guideName').value.trim(),
                phone: document.getElementById('guidePhone').value.trim(),
                license: document.getElementById('guideLicense').value.trim(),
                language: document.getElementById('guideLanguage').value,
                notes: document.getElementById('guideNotes').value.trim(),
                image: uploadedGuideImage,
                guideImage: uploadedGuideImage,
                vehicleImage: uploadedVehicleImage,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            if (!data.name || !data.phone) { showToast('الرجاء ملء الاسم والهاتف', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-check"></i> حفظ المرشد'; return; }
            try {
                if (editId) { await db.collection('guides').doc(editId).update(data);
                    showToast('تم التحديث ✨', 'success'); } else { data.createdAt = firebase.firestore.FieldValue
                        .serverTimestamp();
                    data.isFavorite = false;
                    data.userId = currentUser.uid; await db.collection('guides').add(data);
                    showToast('تمت الإضافة 🎉', 'success'); }
                closeAddModal();
                switchScreen('feed');
            } catch (er) { showToast('خطأ في الحفظ', 'error'); } finally { btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-check"></i> حفظ المرشد'; }
        }

        // ==================== CLOUDINARY ====================
        function openCloudinaryWidget(target) {
            currentUploadTarget = target;
            cloudinary.openUploadWidget({
                cloudName: CLOUDINARY_CLOUD_NAME,
                uploadPreset: CLOUDINARY_UPLOAD_PRESET,
                sources: ['local', 'url', 'camera'],
                multiple: false,
                maxFileSize: 8000000,
                folder: 'f-note-pro',
                language: 'ar',
                cropping: true,
                croppingAspectRatio: target === 'vehicle' ? 1.5 : 0.75,
                showSkipCropButton: false,
                styles: { palette: { window: "#1a1a1a", windowBorder: "#333", tabIcon: "#fe2c55",
                        menuIcons: "#a1a1aa", textDark: "#ffffff", textLight: "#a1a1aa", link: "#fe2c55",
                        action: "#fe2c55", inactiveTabIcon: "#71717a", error: "#ef4444",
                        inProgress: "#fe2c55", complete: "#10b981", sourceBg: "#252525" } }
            }, (error, result) => {
                if (!error && result && result.event === 'success') {
                    const url = result.info.secure_url;
                    if (currentUploadTarget === 'guide') { uploadedGuideImage = url;
                        updateImagePreview('guideImageUpload', url, 'guide'); } else { uploadedVehicleImage =
                            url;
                        updateImagePreview('vehicleImageUpload', url, 'vehicle'); }
                    showToast('تم رفع الصورة 📸', 'success');
                }
            });
        }

        // ==================== IMAGE VIEWER ====================
        function openImageViewer(guideId, type) {
            const guide = guides.find(g => g.id === guideId);
            if (!guide) return;
            currentViewerGuide = guide;
            currentViewerType = type;
            const img = document.getElementById('viewerImage');
            const switchDiv = document.getElementById('viewerSwitch');
            img.src = type === 'guide' ? (guide.image || guide.guideImage) : guide.vehicleImage;
            if (guide.image && guide.vehicleImage) { switchDiv.style.display = 'flex';
                switchDiv.querySelectorAll('button').forEach(b => b.classList.toggle('active', b.dataset.type ===
                    type)); } else { switchDiv.style.display = 'none'; }
            document.getElementById('imageViewer').classList.add('active');
        }

        function switchViewerImage(type) {
            if (!currentViewerGuide) return;
            currentViewerType = type;
            document.getElementById('viewerImage').src = type === 'guide' ? (currentViewerGuide.image || currentViewerGuide
                .guideImage) : currentViewerGuide.vehicleImage;
            document.getElementById('viewerSwitch').querySelectorAll('button').forEach(b => b.classList.toggle('active', b
                .dataset.type === type));
        }

        function closeImageViewer() { document.getElementById('imageViewer').classList.remove('active'); }

        // ==================== GUIDE ACTIONS ====================
        async function toggleFavorite(guideId, index) { try { const s = !guides[index].isFavorite; await db.collection(
                'guides').doc(guideId).update({ isFavorite: s }); } catch (e) { showToast('خطأ', 'error'); } }

        function openWhatsApp(p) { window.open(`https://wa.me/${p.replace(/[^0-9+]/g, '')}`, '_blank'); }

        function callGuide(p) { window.location.href = `tel:${p}`; }

        async function shareGuide(guideId) { const g = guides.find(gg => gg.id === guideId); if (!g) return; const t =
                `🚐 مرشد: ${g.name}\n📞 ${g.phone}\n📋 ${g.license||''}\n🗣 ${g.language||''}\n📱 F-Note Pro`; if (
                navigator.share) { try { await navigator.share({ title: 'F-Note Pro', text: t }); } catch (e) {} } else { try { await navigator
                    .clipboard.writeText(t);
                showToast('تم النسخ 📋', 'success'); } catch (e) { showToast('تعذر النسخ', 'error'); } } }

        // ==================== SEARCH ====================
        document.getElementById('searchInput').addEventListener('input', debounce(function(e) { const term = e.target.value
                .trim(); if (term) searchGuides(term);
            else document.getElementById('searchResults').innerHTML =
                '<div class="no-results"><i class="fa-solid fa-magnifying-glass"></i><p>ابدأ البحث</p></div>'; },
            350));

        function filterByColor(color, btn) {
            activeColorFilter = color;
            document.querySelectorAll('#colorFilters .color-chip').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            const term = document.getElementById('searchInput').value.trim();
            if (term) searchGuides(term);
        }

        async function searchGuides(term) {
            const rc = document.getElementById('searchResults');
            rc.innerHTML =
                '<div class="loading-spinner" style="grid-column:1/-1;padding:60px;"><div class="spinner"></div></div>';
            try {
                const snap = await db.collection('guides').where('userId', '==', currentUser.uid).orderBy('name').startAt(
                    term).endAt(term + '\uf8ff').limit(30).get();
                let results = [];
                snap.forEach(d => results.push({ id: d.id, ...d.data() }));
                if (activeColorFilter === 'star') results = results.filter(g => g.isFavorite);
                if (!results.length) { rc.innerHTML =
                        `<div class="no-results"><i class="fa-solid fa-face-sad-tear"></i><p>لا نتائج لـ "${term}"</p></div>`; return; }
                rc.innerHTML = results.map(g => `
                    <div class="search-result-item" style="background-image:url('${g.image||g.guideImage||'https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=400&q=60'}')" onclick="viewFromSearch('${g.id}')">
                        <div class="search-result-overlay"><div class="sr-name">${g.name}</div><div class="sr-lang">${g.language||''}</div></div>
                    </div>`).join('');
            } catch (e) { rc.innerHTML =
                    '<div class="no-results"><i class="fa-solid fa-triangle-exclamation"></i><p>خطأ</p></div>'; }
        }

        function viewFromSearch(id) { const i = guides.findIndex(g => g.id === id); if (i !== -1) { currentFeedIndex = i;
                updateFeedPosition();
                switchScreen('feed'); } }

        // ==================== VOICE ====================
        function startVoiceSearch() { if (!settings.voiceSearch) return; const btn = document.getElementById(
                'voiceSearchBtn'); if (!('webkitSpeechRecognition' in window)) { showToast('غير مدعوم', 'error'); return; }
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SR();
            recognition.lang = 'ar-TN';
            recognition.interimResults = false;
            btn.classList.add('recording');
            recognition.start();
            recognition.onresult = (e) => { document.getElementById('searchInput').value = e.results[0][0].transcript;
                searchGuides(e.results[0][0].transcript);
                btn.classList.remove('recording'); };
            recognition.onerror = () => { btn.classList.remove('recording');
                showToast('لم يتم التعرف على الصوت', 'error'); };
            recognition.onend = () => btn.classList.remove('recording'); }

        function startNameVoice() { const btn = document.getElementById('nameVoiceBtn'); if (!('webkitSpeechRecognition' in
                window)) { showToast('غير مدعوم', 'error'); return; } const SR = window.SpeechRecognition || window
                .webkitSpeechRecognition;
            recognition = new SR();
            recognition.lang = 'ar-TN';
            recognition.interimResults = false;
            btn.classList.add('recording');
            recognition.start();
            recognition.onresult = (e) => { document.getElementById('guideName').value = e.results[0][0].transcript;
                btn.classList.remove('recording'); };
            recognition.onerror = () => btn.classList.remove('recording');
            recognition.onend = () => btn.classList.remove('recording'); }

        // ==================== TOAST ====================
        function showToast(msg, type = '') { const c = document.getElementById('toastContainer'); const t = document
                .createElement('div');
            t.className = `toast ${type}`; const icons = { success: 'circle-check', error: 'circle-xmark' };
            t.innerHTML = `<i class="fa-solid fa-${icons[type]||'bell'}"></i> ${msg}`;
            c.appendChild(t);
            setTimeout(() => { if (t.parentNode) t.remove(); }, 2800); }

        function debounce(f, w) { let t; return function(...a) { clearTimeout(t);
                t = setTimeout(() => f.apply(this, a), w); }; }

        // ==================== EVENT LISTENERS ====================
        document.getElementById('addModal').addEventListener('click', function(e) { if (e.target === this) closeAddModal(
            ); });
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') { if (document.getElementById('addModal')
                .classList.contains('active')) closeAddModal(); if (document.getElementById('imageViewer').classList
                .contains('active')) closeImageViewer(); if (document.getElementById('settingsPanel').classList.contains(
                    'open')) closeSettings(); } if (currentScreen === 'feed' && !document.getElementById('addModal')
                .classList.contains('active') && !document.getElementById('imageViewer').classList.contains('active')) { if (
                    e.key === 'ArrowDown' && currentFeedIndex < guides.length - 1) { e.preventDefault();
                    currentFeedIndex++;
                    updateFeedPosition(); } else if (e.key === 'ArrowUp' && currentFeedIndex > 0) { e.preventDefault();
                    currentFeedIndex--;
                    updateFeedPosition(); } } });

        console.log('🚀 F-Note Pro - Ultimate Merged Version Ready');
        console.log('👤 Auth + ☁️ Cloudinary + 🖼️ Dual Images + 🎨 Color Filters + ⚙️ Settings');
    </script>
