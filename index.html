    function t(key) { return translations[currentLang]?.[key] || translations.tn[key] || key; }
    function updateUI() {
        document.getElementById("loginTitle").innerText = t('loginTitle'); document.getElementById("menuTitle").innerText = t('menuTitle'); document.getElementById("accountTitle").innerText = t('accountTitle'); document.getElementById("settingsTitle").innerText = t('settingsTitle'); document.getElementById("aboutTitle").innerText = t('aboutTitle'); document.getElementById("logoutText").innerText = t('logoutText'); document.getElementById("darkModeText").innerText = document.body.classList.contains("dark") ? t('lightMode') : t('darkMode'); document.getElementById("syncText").innerHTML = `🔄 ${t('sync')}`; document.getElementById("exportText").innerHTML = `💾 ${t('export')}`; document.getElementById("pdfText").innerHTML = `📄 ${t('pdf')}`; document.getElementById("aboutText").innerText = t('aboutText'); document.getElementById("searchInput").placeholder = t('searchPlaceholder'); document.getElementById("modalTitle").innerText = currentEditId ? t('editGuide') : t('addGuide'); document.getElementById("colorLabel").innerText = t('cardColor'); document.getElementById("guidePhotoLabel").innerText = t('guidePhoto'); document.getElementById("busPhotoLabel").innerText = t('busPhoto'); document.getElementById("saveGuideBtn").innerHTML = t('save'); document.getElementById("closeModalBtn").innerHTML = t('cancel'); document.getElementById("shareWhatsappBtn").innerHTML = t('share'); document.getElementById("closeDetailBtn").innerHTML = t('close'); document.getElementById("filterToggleBtn").innerHTML = `🎨 ${t('filter')} ▼`; document.getElementById("cloudinaryGuideBtn").innerHTML = `📸 ${t('selectImage')}`; document.getElementById("cloudinaryBusBtn").innerHTML = `🚌 ${t('selectImage')}`; renderList();
    }

    // رفع الصور بـ Cloudinary (سريع ومساحة 10 جيجا)
    function openCloudinaryWidget(type) { if(!currentUser) { showToast("سجل دخولك أولاً", true); return; }
        const statusDiv = document.getElementById(type === 'guide' ? 'guideUploadStatus' : 'busUploadStatus');
        statusDiv.innerText = t('uploading'); statusDiv.classList.add('show');
        const widget = cloudinary.createUploadWidget({ cloudName: cloudinaryConfig.cloudName, uploadPreset: cloudinaryConfig.uploadPreset, multiple: false, cropping: true, sources: ['local', 'camera'] }, (error, result) => {
            if(error) { statusDiv.innerText = t('uploadError'); setTimeout(()=>statusDiv.classList.remove('show'),2000); showToast(t('uploadError'), true); return; }
            if(result && result.event === "success") {
                const url = result.info.secure_url;
                if(type === 'guide') { currentGuidePhotoUrl = url; document.getElementById("guidePhotoPreview").src = url; document.getElementById("guidePhotoPreview").style.display = "block"; }
                else { currentBusPhotoUrl = url; document.getElementById("busPhotoPreview").src = url; document.getElementById("busPhotoPreview").style.display = "block"; }
                statusDiv.innerText = t('uploadSuccess'); setTimeout(()=>statusDiv.classList.remove('show'),2000); showToast(t('uploadSuccess'));
            }
        }); widget.open();
    }
    document.getElementById("cloudinaryGuideBtn").onclick = () => openCloudinaryWidget('guide');
    document.getElementById("cloudinaryBusBtn").onclick = () => openCloudinaryWidget('bus');

    // البحث والفلترة
    function smartSearch(query, text) { if(!query) return true; let q=query.toLowerCase(), tText=(text||"").toLowerCase(); if(tText.includes(q)) return true; const map={'٠':'0','١':'1','٢':'2','٣':'3','٤':'4','٥':'5','٦':'6','٧':'7','٨':'8','٩':'9'}; let tn=tText.replace(/[٠-٩]/g,m=>map[m]), qn=q.replace(/[٠-٩]/g,m=>map[m]); return tn.includes(qn); }
    function filterGuides() { let search = document.getElementById("searchInput").value; let filtered = guides.filter(g=>smartSearch(search, g.name)||smartSearch(search, g.phone)||smartSearch(search, g.transportType)||smartSearch(search, g.agency)||smartSearch(search, g.plateNumber)); if(currentColorFilter !== "all") filtered = filtered.filter(g=>g.cardColor === currentColorFilter); filtered.sort((a,b)=>(b.favorite?1:0)-(a.favorite?1:0)); return filtered; }
    function escapeHtml(s){ if(!s) return ""; return s.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    function showGuideDetails(g) { currentGuideForDetail=g; document.getElementById("detailName").innerHTML = `<span style="color:${g.cardColor}">⭐</span> ${escapeHtml(g.name)}`; document.getElementById("detailContent").innerHTML = `<div style="text-align:center">${g.guidePhoto?`<img src="${g.guidePhoto}" style="width:100px;height:100px;border-radius:50%;margin:8px;cursor:pointer;" onclick="window.showImage('${g.guidePhoto}')">`:''}${g.busPhoto?`<img src="${g.busPhoto}" style="width:80px;height:80px;border-radius:20px;margin:8px;cursor:pointer;" onclick="window.showImage('${g.busPhoto}')">`:''}</div><div style="background:var(--card-note-bg);padding:16px;border-radius:24px;"><p><strong>📞 ${t('phone')}:</strong> <a href="tel:${g.phone}">${g.phone}</a></p><p><strong>🚐 ${t('transportType')}:</strong> ${escapeHtml(g.transportType||'—')}</p><p><strong>🚍 ${t('plateNumber')}:</strong> <span class="plate-number">${escapeHtml(g.plateNumber||'—')}</span></p><p><strong>🏢 ${t('agency')}:</strong> ${escapeHtml(g.agency||'—')}</p><p><strong>📝 ${t('notes')}:</strong> ${escapeHtml(g.notes||t('noNotes'))}</p>${g.favorite?`<p>⭐ ${t('favorite')}</p>`:''}</div>`; document.getElementById("detailModal").classList.add("show"); }
    window.showImage = (url) => { if(url){ document.getElementById("fullImage").src=url; document.getElementById("fullImageModal").classList.add("show"); } };
    function toggleFavorite(id) { let idx=guides.findIndex(g=>g.id===id); if(idx!==-1){ guides[idx].favorite=!guides[idx].favorite; if(currentUser) syncToCloud(); renderList(); showToast(guides[idx].favorite?"⭐ مضاف":"تمت الإزالة"); } }
    function renderList() { let filtered=filterGuides(); let container=document.getElementById("guidesContainer"); if(filtered.length===0){ container.innerHTML=`<div class="loading">${t('noResults')}</div>`; return; } container.innerHTML=filtered.map(g=>`<div class="guide-card ${g.favorite?'favorite':''}" style="border-right-color:${g.cardColor}" onclick="showGuideDetails(${JSON.stringify(g).replace(/</g,'\\u003c')})"><div class="favorite-star" onclick="event.stopPropagation(); toggleFavorite('${g.id}')">${g.favorite?'⭐':'☆'}</div><div class="card-header"><div class="photos-area"><img class="guide-photo" src="${g.guidePhoto||''}" onclick="event.stopPropagation();window.showImage('${g.guidePhoto}')" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20fill=%22gray%22%3E%3Cpath%20d=%22M12%2012c2.21%200%204-1.79%204-4s-1.79-4-4-4-4%201.79-4%204%201.79%204%204%204z%22/%3E%3C/svg%3E';"><img class="bus-photo" src="${g.busPhoto||''}" onclick="event.stopPropagation();window.showImage('${g.busPhoto}')" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20fill=%22gray%22%3E%3Cpath%20d=%22M5%2011h14v2H5z%22/%3E%3C/svg%3E';"></div><div class="guide-info"><div class="guide-name">${escapeHtml(g.name)}</div><div class="phone-area"><span class="guide-phone">${g.phone}</span><button class="call-btn" onclick="event.stopPropagation();window.location.href='tel:${g.phone}'">📞 ${t('call')}</button></div>${g.plateNumber?`<div class="plate-number" style="font-size:11px;">🚍 ${escapeHtml(g.plateNumber)}</div>`:''}</div></div><div class="details-mini"><div>🚐 ${escapeHtml(g.transportType||'—')}</div><div>🏢 ${escapeHtml(g.agency||'—')}</div></div></div>`).join(""); }
    window.toggleFavorite=toggleFavorite; window.showGuideDetails=showGuideDetails;

    function resetForm() { currentEditId=null; selectedColor="#e94560"; currentGuidePhotoUrl=""; currentBusPhotoUrl=""; document.getElementById("guideName").value=""; document.getElementById("guidePhone").value=""; document.getElementById("plateNumber").value=""; document.getElementById("transportType").value=""; document.getElementById("agency").value=""; document.getElementById("guideNotes").value=""; document.getElementById("guidePhotoPreview").style.display="none"; document.getElementById("busPhotoPreview").style.display="none"; document.querySelectorAll(".color-option").forEach(o=>o.classList.remove("selected")); let def=document.querySelector(".color-option[data-color='#e94560']"); if(def) def.classList.add("selected"); document.getElementById("modalTitle").innerHTML=t('addGuide'); document.getElementById("phoneError").style.display="none"; }
    function validatePhone(p){ return /^[0-9]{8,15}$/.test(p.replace(/[+\s-]/g,'')); }
    function showToast(msg,isErr=false){ let t=document.createElement("div"); t.className="toast"; t.style.background=isErr?"#dc2626":"#1e293b"; t.innerText=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2500); }

    document.getElementById("saveGuideBtn").onclick = async () => { let name=document.getElementById("guideName").value.trim(); let phone=document.getElementById("guidePhone").value.trim(); if(!name||!phone){ showToast(t('phoneRequired'),true); return;} if(!validatePhone(phone)){ document.getElementById("phoneError").style.display="block"; return;} document.getElementById("phoneError").style.display="none"; let newGuide={ id:currentEditId||Date.now().toString(), name, phone, plateNumber:document.getElementById("plateNumber").value.trim(), guidePhoto:currentGuidePhotoUrl, busPhoto:currentBusPhotoUrl, cardColor:selectedColor, transportType:document.getElementById("transportType").value.trim(), agency:document.getElementById("agency").value.trim(), notes:document.getElementById("guideNotes").value.trim(), favorite:currentEditId?(guides.find(g=>g.id===currentEditId)?.favorite||false):false, updatedAt:new Date().toISOString() }; if(currentEditId){ let idx=guides.findIndex(g=>g.id===currentEditId); if(idx!==-1) guides[idx]=newGuide; }else guides.push(newGuide); if(currentUser) await syncToCloud(); renderList(); document.getElementById("guideModal").classList.remove("show"); resetForm(); showToast(t('saved')); };

    async function syncToCloud(){ if(!currentUser) return; try{ await db.collection("guides").doc(currentUser.uid).set({ data:guides, email:currentUser.email, updatedAt:new Date() }); showToast("✅ "+t('sync')); }catch(e){ showToast("❌ "+e.message,true); } }
    async function loadFromCloud(){ if(!currentUser) return; try{ let doc=await db.collection("guides").doc(currentUser.uid).get(); guides=doc.exists&&doc.data().data?doc.data().data:[]; renderList(); showToast(`✅ ${guides.length} مرشد`); }catch(e){ showToast("❌ "+e.message,true); } }

    async function handleLogin(email,password){ try{ await auth.signInWithEmailAndPassword(email,password); }catch(e){ showToast(e.message,true); } }
    function handleLogout(){ if(confirm(t('logout')+"?")){ auth.signOut(); currentUser=null; guides=[]; renderList(); document.getElementById("loginScreen").classList.remove("hide"); document.getElementById("signOutBtn").style.display="none"; showToast(t('logout')); } }
    auth.onAuthStateChanged(async(user)=>{ if(user){ currentUser=user; document.getElementById("loginScreen").classList.add("hide"); document.getElementById("signOutBtn").style.display="flex"; document.getElementById("userInfo").innerHTML=`${user.email} <span style="background:#10b981;padding:2px 8px;border-radius:30px;font-size:10px;">سحابي</span>`; await loadFromCloud(); } });
    document.getElementById("loginBtn").onclick = () => handleLogin(loginEmail.value.trim(), loginPassword.value.trim());
    document.getElementById("signOutBtn").onclick = handleLogout;

    // أحداث
    document.getElementById("menuBtn").onclick = () => { document.getElementById("sidebar").classList.add("open"); document.getElementById("overlay").classList.add("show"); };
    document.getElementById("closeSidebar").onclick = () => { document.getElementById("sidebar").classList.remove("open"); document.getElementById("overlay").classList.remove("show"); };
    document.getElementById("overlay").onclick = () => { document.getElementById("sidebar").classList.remove("open"); document.getElementById("overlay").classList.remove("show"); };
    document.getElementById("openModalBtn").onclick = () => { resetForm(); document.getElementById("guideModal").classList.add("show"); };
    document.getElementById("closeModalBtn").onclick = () => document.getElementById("guideModal").classList.remove("show");
    document.getElementById("closeDetailBtn").onclick = () => document.getElementById("detailModal").classList.remove("show");
    document.getElementById("closeFullImageBtn").onclick = () => document.getElementById("fullImageModal").classList.remove("show");
    document.getElementById("searchInput").oninput = () => renderList();
    document.getElementById("syncNowBtn").onclick = async () => { if(currentUser) await syncToCloud(); else showToast("سجل دخولك", true); };
    document.getElementById("exportDataBtn").onclick = () => { const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([JSON.stringify(guides,null,2)],{type:"application/json"})); a.download=`F-NotePro_${Date.now()}.json`; a.click(); showToast(t('export')); };
    document.getElementById("darkModeSidebar").onclick = () => { document.body.classList.toggle("dark"); localStorage.setItem("darkMode",document.body.classList.contains("dark")); document.getElementById("darkModeText").innerText = document.body.classList.contains("dark") ? t('lightMode') : t('darkMode'); };
    document.getElementById("exportPdfBtn").onclick = () => { let el=document.createElement("div"); el.innerHTML=`<h1>F-Note Pro</h1><hr>`; guides.forEach(g=>{ el.innerHTML+=`<div><strong>${g.name}</strong><br>📞 ${g.phone}<br>🚐 ${g.transportType||'-'}<br>🚍 ${g.plateNumber||'-'}</div><hr>`; }); html2pdf().from(el).save(); };
    document.getElementById("filterToggleBtn").onclick = () => { document.getElementById("colorsPanel").classList.toggle("show"); document.getElementById("filterToggleBtn").innerHTML = `🎨 ${t('filter')} ${document.getElementById("colorsPanel").classList.contains("show")?"▲":"▼"}`; };
    document.querySelectorAll(".color-filter-btn").forEach(btn=>{ btn.onclick=()=>{ currentColorFilter=btn.dataset.color; document.querySelectorAll(".color-filter-btn").forEach(b=>b.classList.remove("active")); btn.classList.add("active"); renderList(); document.getElementById("colorsPanel").classList.remove("show"); document.getElementById("filterToggleBtn").innerHTML = `🎨 ${t('filter')} ▼`; }; });
    const colorSelectorDiv = document.getElementById("colorSelector"); if(colorSelectorDiv){ colorSelectorDiv.innerHTML = `<div class="color-option" style="background:#e94560;" data-color="#e94560"></div><div class="color-option" style="background:#2c7da0;" data-color="#2c7da0"></div><div class="color-option" style="background:#e76f51;" data-color="#e76f51"></div><div class="color-option" style="background:#2a9d8f;" data-color="#2a9d8f"></div><div class="color-option" style="background:#e9c46a;" data-color="#e9c46a"></div><div class="color-option" style="background:#9b5de5;" data-color="#9b5de5"></div><div class="color-option" style="background:#06d6a0;" data-color="#06d6a0"></div><div class="color-option" style="background:#ff006e;" data-color="#ff006e"></div>`; document.querySelectorAll("#colorSelector .color-option").forEach(opt=>{ opt.onclick=()=>{ document.querySelectorAll("#colorSelector .color-option").forEach(o=>o.classList.remove("selected")); opt.classList.add("selected"); selectedColor=opt.dataset.color; }; }); document.querySelector(".color-option[data-color='#e94560']").classList.add("selected"); }

    let recognition; if('webkitSpeechRecognition' in window) recognition = new webkitSpeechRecognition();
    document.getElementById("voiceSearchBtn").onclick = () => { if(!recognition){ showToast("غير مدعوم",true); return; } recognition.lang='ar-TN'; recognition.start(); document.getElementById("voiceSearchBtn").classList.add("listening"); showToast("🎤 تحدث..."); recognition.onresult=(e)=>{ document.getElementById("searchInput").value=e.results[0][0].transcript; renderList(); document.getElementById("voiceSearchBtn").classList.remove("listening"); }; recognition.onerror=()=>{ document.getElementById("voiceSearchBtn").classList.remove("listening"); showToast("❌ ما فهمتش",true); }; recognition.onend=()=>{ document.getElementById("voiceSearchBtn").classList.remove("listening"); }; };
    document.getElementById("shareWhatsappBtn").onclick = () => { if(currentGuideForDetail){ window.open(`https://wa.me/${currentGuideForDetail.phone.replace(/[^0-9]/g,'')}?text=${encodeURIComponent(`*${currentGuideForDetail.name}*\n📞 ${currentGuideForDetail.phone}\n🚐 ${currentGuideForDetail.transportType||''}\n🚍 لوحة: ${currentGuideForDetail.plateNumber||''}`)}`,'_blank'); } };
    if(localStorage.getItem("darkMode")==="true") document.body.classList.add("dark");
    if(localStorage.getItem("lang")){ currentLang=localStorage.getItem("lang"); document.getElementById("langSelect").value=currentLang; }
    document.getElementById("langSelect").onchange = e => { currentLang=e.target.value; localStorage.setItem("lang",currentLang); updateUI(); };
    updateUI();
    console.log("✅ F-Note Pro 18.0 - Cloudinary 10GB + ترجمة كاملة");
</script>
</body>
</html>
