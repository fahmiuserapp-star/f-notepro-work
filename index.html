<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>F-Note Pro | المرشدين السياحيين</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <!-- Cloudinary Upload Widget -->
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts - Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #fe2c55;
            --primary-dark: #e8254a;
            --primary-light: rgba(254, 44, 85, 0.15);
            --secondary: #25f4ee;
            --accent-gold: #f59e0b;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --bg-primary: #121212;
            --bg-card: #1e1e1e;
            --bg-elevated: #252525;
            --bg-input: rgba(255, 255, 255, 0.06);
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --text-tertiary: #71717a;
            --border-color: rgba(255, 255, 255, 0.08);
            --border-focus: rgba(254, 44, 85, 0.4);
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --bottom-nav-height: 72px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --modal-radius: 28px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        *:focus {
            outline: none;
        }

        body {
            font-family: 'Cairo', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* ============ AUTH SCREEN ============ */
        .auth-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #000000 0%, #1a1a2e 50%, #16213e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5000;
            padding: 20px;
            transition: all 0.6s cubic-bezier(0.76, 0, 0.24, 1);
        }

        .auth-screen.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.05);
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-logo .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 16px;
            box-shadow: 0 15px 40px rgba(254, 44, 85, 0.4);
            animation: logoPulse 2s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0%, 100% { box-shadow: 0 15px 40px rgba(254, 44, 85, 0.4); transform: scale(1); }
            50% { box-shadow: 0 20px 50px rgba(254, 44, 85, 0.6); transform: scale(1.03); }
        }

        .auth-logo h1 {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .auth-form input {
            width: 100%;
            padding: 14px 18px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
        }

        .auth-form input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 4px var(--primary-light);
        }

        .auth-btn {
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 800;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
            margin-top: 8px;
            box-shadow: 0 10px 30px rgba(254, 44, 85, 0.3);
        }

        .auth-btn:active {
            transform: scale(0.96);
        }

        .auth-toggle {
            text-align: center;
            margin-top: 20px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .auth-toggle span {
            color: var(--primary);
            cursor: pointer;
            font-weight: 700;
        }

        .error-message {
            color: var(--danger);
            text-align: center;
            font-size: 14px;
            margin-top: 10px;
            display: none;
            padding: 10px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 10px;
        }

        .error-message.show {
            display: block;
        }

        /* ============ APP CONTAINER ============ */
        .app-container {
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .app-container.hidden {
            display: none;
        }

        .main-content {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* ============ TOP HEADER BAR ============ */
        .top-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 12px 16px;
            padding-top: calc(env(safe-area-inset-top, 20px) + 8px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            pointer-events: none;
        }

        .top-header > * {
            pointer-events: auto;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header-logo .mini-icon {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .header-logo span {
            font-weight: 800;
            font-size: 16px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .header-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .header-btn:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.15);
        }

        .header-btn.logout-btn:active {
            background: var(--danger);
            border-color: var(--danger);
        }

        /* ============ FEED SCREEN ============ */
        .feed-screen {
            height: 100%;
            position: relative;
            overflow: hidden;
            display: none;
        }

        .feed-screen.active {
            display: block;
        }

        .feed-stack {
            height: 100%;
            transition: transform 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            will-change: transform;
        }

        .guide-card {
            height: 100vh;
            height: 100dvh;
            width: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            display: flex;
            align-items: flex-end;
            cursor: grab;
            background-color: var(--bg-card);
        }

        .guide-card:active {
            cursor: grabbing;
        }

        .card-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 65%;
            background: linear-gradient(to top,
                    rgba(0, 0, 0, 0.95) 0%,
                    rgba(0, 0, 0, 0.75) 25%,
                    rgba(0, 0, 0, 0.4) 50%,
                    rgba(0, 0, 0, 0.1) 75%,
                    transparent 100%);
            pointer-events: none;
        }

        .card-vehicle-badge {
            position: absolute;
            top: 110px;
            left: 16px;
            z-index: 3;
            display: flex;
            gap: 8px;
            flex-direction: column;
        }

        .vehicle-thumb {
            width: 70px;
            height: 70px;
            border-radius: 16px;
            background-size: cover;
            background-position: center;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .vehicle-thumb:active {
            transform: scale(1.1);
            border-color: var(--primary);
        }

        .card-top-badge {
            position: absolute;
            top: 60px;
            left: 16px;
            z-index: 3;
            display: flex;
            gap: 8px;
        }

        .card-badge {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .card-badge.favorite-badge {
            color: var(--warning);
            border-color: rgba(245, 158, 11, 0.3);
        }

        .card-badge.favorite-badge i {
            color: var(--warning);
        }

        .card-content {
            position: relative;
            z-index: 2;
            width: 100%;
            padding: 20px 16px;
            padding-bottom: calc(var(--bottom-nav-height) + var(--safe-bottom) + 20px);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 12px;
        }

        .guide-info {
            flex: 1;
            min-width: 0;
        }

        .guide-name {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 6px;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.9);
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .guide-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
        }

        .meta-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .meta-badge i {
            font-size: 11px;
            opacity: 0.8;
        }

        .lang-badge {
            background: rgba(37, 244, 238, 0.15);
            color: var(--secondary);
            border-color: rgba(37, 244, 238, 0.25);
        }

        .guide-notes {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            line-height: 1.5;
            max-width: 280px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-shadow: 0 1px 10px rgba(0, 0, 0, 0.8);
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 18px;
            align-items: center;
            flex-shrink: 0;
        }

        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            padding: 0;
        }

        .action-btn .btn-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.25s ease;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .action-btn .btn-label {
            font-size: 11px;
            font-weight: 600;
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.8);
        }

        .action-btn:active .btn-icon {
            transform: scale(0.85);
        }

        .action-btn.favorite.active .btn-icon {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 8px 25px rgba(254, 44, 85, 0.5);
            animation: heartPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .action-btn.whatsapp:active .btn-icon {
            background: #25D366;
            border-color: #25D366;
        }
        .action-btn.call:active .btn-icon {
            background: var(--success);
            border-color: var(--success);
        }
        .action-btn.share:active .btn-icon {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        @keyframes heartPop {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.25);
            }
            100% {
                transform: scale(1);
            }
        }

        /* ============ IMAGE VIEWER MODAL ============ */
        .image-viewer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 4000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .image-viewer-overlay.active {
            display: flex;
        }

        .image-viewer-content {
            max-width: 95vw;
            max-height: 85vh;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
        }

        .image-viewer-content img {
            width: 100%;
            height: auto;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 16px;
        }

        .image-viewer-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.6);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            z-index: 10;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-viewer-switch {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .image-viewer-switch button {
            padding: 10px 20px;
            border-radius: 24px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            font-size: 13px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .image-viewer-switch button.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        /* ============ EMPTY STATE ============ */
        .empty-state {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            text-align: center;
            padding: 40px;
        }

        .empty-icon {
            width: 100px;
            height: 100px;
            background: var(--bg-elevated);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            margin-bottom: 24px;
            border: 2px dashed var(--border-color);
            color: var(--text-tertiary);
        }

        .empty-state h3 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        .empty-state p {
            font-size: 14px;
            color: var(--text-tertiary);
            max-width: 250px;
            line-height: 1.5;
        }

        /* ============ LOADING ============ */
        .loading-spinner {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(255, 255, 255, 0.08);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ============ SEARCH SCREEN ============ */
        .search-screen {
            height: 100%;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }
        .search-screen.active {
            display: flex;
        }

        .search-header {
            padding: 12px 16px;
            background: var(--bg-primary);
            z-index: 10;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .search-input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            background: var(--bg-elevated);
            border-radius: 24px;
            padding: 10px 18px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            gap: 10px;
        }
        .search-input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-light);
        }
        .search-input-wrapper i {
            color: var(--text-tertiary);
            font-size: 16px;
        }
        .search-input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 15px;
            font-family: 'Cairo', sans-serif;
            padding: 4px 0;
            min-width: 0;
        }
        .search-input-wrapper input::placeholder {
            color: var(--text-tertiary);
        }

        .voice-search-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 17px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }
        .voice-search-btn.recording {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
            animation: pulse 1.2s infinite;
        }

        /* Color filter chips */
        .color-filters {
            display: flex;
            gap: 8px;
            padding: 8px 16px;
            overflow-x: auto;
            flex-shrink: 0;
        }
        .color-chip {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background: var(--bg-elevated);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .color-chip .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .color-chip.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .search-results {
            flex: 1;
            overflow-y: auto;
            padding: 6px 8px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px;
            padding-bottom: calc(var(--bottom-nav-height) + var(--safe-bottom) + 10px);
        }

        .search-result-item {
            aspect-ratio: 1;
            background-size: cover;
            background-position: center;
            background-color: var(--bg-elevated);
            border-radius: 6px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.2s ease;
        }
        .search-result-item:active {
            transform: scale(0.94);
            opacity: 0.9;
        }
        .search-result-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 8px 6px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.85) 0%, transparent 100%);
        }
        .search-result-overlay .sr-name {
            font-size: 11px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .search-result-overlay .sr-lang {
            font-size: 10px;
            color: var(--text-secondary);
        }
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-tertiary);
        }
        .no-results i {
            font-size: 48px;
            margin-bottom: 12px;
            display: block;
            opacity: 0.5;
        }

        /* ============ ADD MODAL ============ */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            align-items: flex-end;
            justify-content: center;
            z-index: 2000;
            animation: fadeIn 0.25s ease;
        }
        .modal-overlay.active {
            display: flex;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal-sheet {
            background: #1a1a1a;
            width: 100%;
            max-width: 500px;
            max-height: 88vh;
            max-height: 88dvh;
            border-radius: var(--modal-radius) var(--modal-radius) 0 0;
            overflow-y: auto;
            animation: slideUp 0.45s cubic-bezier(0.32, 0.72, 0, 1);
            box-shadow: 0 -10px 50px rgba(0, 0, 0, 0.6);
        }
        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }
        .modal-handle {
            width: 36px;
            height: 5px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 3px;
            margin: 14px auto 4px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 20px 16px;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            background: #1a1a1a;
            z-index: 2;
            backdrop-filter: blur(10px);
        }
        .modal-header h2 {
            font-size: 19px;
            font-weight: 800;
        }
        .modal-close {
            background: var(--bg-elevated);
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 18px;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.2s ease;
        }
        .modal-close:active {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(0.9);
        }

        .modal-form {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* Dual image upload */
        .dual-image-upload {
            display: flex;
            gap: 12px;
        }
        .image-upload-area {
            flex: 1;
            height: 150px;
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--text-tertiary);
            cursor: pointer;
            transition: all 0.3s ease;
            background-size: cover;
            background-position: center;
            background-color: var(--bg-input);
            position: relative;
            overflow: hidden;
        }
        .image-upload-area:active {
            transform: scale(0.97);
        }
        .image-upload-area.has-image {
            border-color: var(--success);
            border-style: solid;
        }
        .image-upload-area i {
            font-size: 32px;
            transition: all 0.3s ease;
        }
        .image-upload-area span {
            font-size: 12px;
            font-weight: 500;
            text-align: center;
        }
        .image-upload-area.has-image i,
        .image-upload-area.has-image span {
            display: none;
        }
        .image-change-badge {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
            display: none;
            backdrop-filter: blur(10px);
        }
        .image-upload-area.has-image .image-change-badge {
            display: block;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-group label {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 13px 16px;
            background: var(--bg-input);
            border: 1.5px solid var(--border-color);
            border-radius: 14px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-light);
            background: rgba(255, 255, 255, 0.08);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
            line-height: 1.5;
        }

        .voice-input-group {
            display: flex;
            gap: 8px;
        }
        .voice-input-group input {
            flex: 1;
        }
        .voice-input-btn {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: var(--bg-input);
            border: 1.5px solid var(--border-color);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }
        .voice-input-btn:active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .voice-input-btn.recording {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
            animation: pulse 1.2s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6);
            }
            50% {
                box-shadow: 0 0 0 14px rgba(239, 68, 68, 0);
            }
        }

        .form-row {
            display: flex;
            gap: 10px;
        }
        .form-row .form-group {
            flex: 1;
        }

        .submit-btn {
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 800;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
            margin-top: 6px;
            letter-spacing: 0.5px;
            box-shadow: 0 8px 30px rgba(254, 44, 85, 0.3);
        }
        .submit-btn:active {
            transform: scale(0.96);
        }
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .delete-confirm {
            display: none;
            padding: 16px 20px;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 16px;
            margin-top: 8px;
            text-align: center;
        }
        .delete-confirm.show {
            display: block;
        }
        .delete-confirm p {
            font-size: 13px;
            margin-bottom: 10px;
            color: var(--danger);
        }
        .delete-confirm-btns {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        .delete-confirm-btns button {
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            border: none;
            font-family: 'Cairo', sans-serif;
        }
        .btn-confirm-delete {
            background: var(--danger);
            color: white;
        }
        .btn-cancel-delete {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        /* ============ SETTINGS PANEL ============ */
        .settings-panel {
            position: fixed;
            top: 0;
            right: -320px;
            width: 300px;
            height: 100vh;
            height: 100dvh;
            background: var(--bg-card);
            z-index: 3500;
            transition: right 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            padding: 20px;
            overflow-y: auto;
            box-shadow: -10px 0 40px rgba(0, 0, 0, 0.5);
        }
        .settings-panel.open {
            right: 0;
        }
        .settings-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 3400;
            display: none;
        }
        .settings-backdrop.show {
            display: block;
        }
        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .settings-header h3 {
            font-size: 18px;
            font-weight: 800;
        }
        .settings-section {
            margin-bottom: 24px;
        }
        .settings-section h4 {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .setting-item span {
            font-size: 14px;
        }
        .toggle-switch {
            width: 50px;
            height: 28px;
            background: var(--bg-elevated);
            border-radius: 14px;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
            border: 1px solid var(--border-color);
        }
        .toggle-switch.active {
            background: var(--primary);
            border-color: var(--primary);
        }
        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: all 0.3s ease;
        }
        .toggle-switch.active::after {
            left: 25px;
        }

        /* ============ BOTTOM NAVIGATION ============ */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--bottom-nav-height);
            background: rgba(18, 18, 18, 0.92);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid var(--border-color);
            z-index: 1000;
            padding-bottom: var(--safe-bottom);
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: var(--text-tertiary);
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px 16px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-family: 'Cairo', sans-serif;
            position: relative;
            min-width: 70px;
        }
        .nav-item.active {
            color: var(--text-primary);
        }
        .nav-item i {
            font-size: 22px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .nav-item span {
            font-size: 11px;
            font-weight: 700;
        }
        .nav-indicator {
            position: absolute;
            top: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 3px;
            background: var(--primary);
            border-radius: 0 0 3px 3px;
            transition: all 0.35s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            opacity: 0;
        }
        .nav-item.active .nav-indicator {
            opacity: 1;
        }
        .nav-item.add-btn i {
            font-size: 30px;
            background: linear-gradient(135deg, var(--primary), #ff6b81);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 4px 8px rgba(254, 44, 85, 0.5));
        }

        /* ============ TOAST ============ */
        .toast-container {
            position: fixed;
            bottom: calc(var(--bottom-nav-height) + var(--safe-bottom) + 16px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            background: var(--bg-elevated);
            color: var(--text-primary);
            padding: 12px 22px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 700;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            white-space: nowrap;
            animation: toastIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55), toastOut 0.3s ease 2.4s forwards;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: auto;
        }
        .toast.success {
            border-color: var(--success);
            color: var(--success);
            background: rgba(16, 185, 129, 0.1);
        }
        .toast.error {
            border-color: var(--danger);
            color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
        }
        @keyframes toastIn {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        @keyframes toastOut {
            from {
                transform: translateY(0);
                opacity: 1;
            }
            to {
                transform: translateY(20px);
                opacity: 0;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 0;
        }

        /* Responsive */
        @media (max-width: 360px) {
            .guide-name {
                font-size: 24px;
            }
            .action-btn .btn-icon {
                width: 38px;
                height: 38px;
                font-size: 17px;
            }
            .form-row {
                flex-direction: column;
            }
            .dual-image-upload {
                flex-direction: column;
            }
        }
        @media (min-width: 768px) {
            .search-results {
                grid-template-columns: repeat(4, 1fr);
                gap: 4px;
            }
            .guide-name {
                font-size: 34px;
            }
            .modal-sheet {
                border-radius: var(--modal-radius);
                margin-bottom: 20px;
                max-height: 80vh;
            }
        }
        @media (min-width: 1024px) {
            body {
                max-width: 430px;
                margin: 0 auto;
                border-left: 1px solid var(--border-color);
                border-right: 1px solid var(--border-color);
            }
            .bottom-nav {
                max-width: 430px;
                left: 50%;
                transform: translateX(-50%);
                border-radius: 20px 20px 0 0;
            }
        }
    </style>
</head>
<body>

    <!-- ==================== AUTH SCREEN ==================== -->
    <div id="authScreen" class="auth-screen">
        <div class="auth-container">
            <div class="auth-logo">
                <div class="logo-icon"><i class="fa-solid fa-shield-halved" style="color: white;"></i></div>
                <h1>F-Note Pro</h1>
            </div>
            <form id="authForm" class="auth-form">
                <input type="email" id="authEmail" placeholder="البريد الإلكتروني" required dir="ltr">
                <input type="password" id="authPassword" placeholder="كلمة المرور" required>
                <button type="submit" class="auth-btn" id="authSubmitBtn">تسجيل الدخول</button>
            </form>
            <p class="auth-toggle" id="authToggle">
                ليس لديك حساب؟ <span onclick="toggleAuthMode()">إنشاء حساب جديد</span>
            </p>
            <p class="error-message" id="authError"></p>
        </div>
    </div>

    <!-- ==================== SETTINGS PANEL ==================== -->
    <div class="settings-backdrop" id="settingsBackdrop" onclick="closeSettings()"></div>
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-header">
            <h3><i class="fa-solid fa-gear"></i> الإعدادات</h3>
            <button class="modal-close" onclick="closeSettings()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="settings-section">
            <h4>المظهر</h4>
            <div class="setting-item">
                <span><i class="fa-solid fa-moon"></i> الوضع الليلي</span>
                <div class="toggle-switch active" id="darkModeToggle" onclick="toggleSetting('darkMode')"></div>
            </div>
            <div class="setting-item">
                <span><i class="fa-solid fa-wand-magic-sparkles"></i> تأثيرات حركية</span>
                <div class="toggle-switch active" id="animationsToggle" onclick="toggleSetting('animations')"></div>
            </div>
        </div>
        <div class="settings-section">
            <h4>البحث</h4>
            <div class="setting-item">
                <span><i class="fa-solid fa-microphone"></i> البحث الصوتي</span>
                <div class="toggle-switch active" id="voiceSearchToggle" onclick="toggleSetting('voiceSearch')"></div>
            </div>
        </div>
        <div class="settings-section">
            <h4>الحساب</h4>
            <button class="submit-btn" style="width: 100%; background: transparent; border: 1.5px solid var(--danger); color: var(--danger); box-shadow: none;" onclick="logout()">
                <i class="fa-solid fa-right-from-bracket"></i> تسجيل الخروج
            </button>
        </div>
    </div>

    <!-- ==================== APP CONTAINER ==================== -->
    <div id="appContainer" class="app-container hidden">

        <!-- Feed Screen -->
        <div id="feedScreen" class="feed-screen active">
            <!-- Top Header -->
            <div class="top-header">
                <div class="header-logo">
                    <div class="mini-icon"><i class="fa-solid fa-shield-halved" style="color: white; font-size: 14px;"></i></div>
                    <span>F-Note Pro</span>
                </div>
                <div class="header-actions">
                    <button class="header-btn" onclick="openSettings()" title="الإعدادات">
                        <i class="fa-solid fa-gear"></i>
                    </button>
                    <button class="header-btn logout-btn" onclick="logout()" title="تسجيل الخروج">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </button>
                </div>
            </div>
            <div class="main-content">
                <div id="feedStack" class="feed-stack"></div>
            </div>
        </div>

        <!-- Search Screen -->
        <div id="searchScreen" class="search-screen">
            <div class="search-header">
                <div class="search-input-wrapper">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchInput" placeholder="ابحث باسم المرشد...">
                </div>
                <button class="voice-search-btn" id="voiceSearchBtn" onclick="startVoiceSearch()" title="بحث صوتي">
                    <i class="fa-solid fa-microphone"></i>
                </button>
            </div>
            <div class="color-filters" id="colorFilters">
                <button class="color-chip active" data-color="all" onclick="filterByColor('all', this)">
                    <span class="color-dot" style="background: linear-gradient(135deg, var(--primary), var(--secondary));"></span> الكل
                </button>
                <button class="color-chip" data-color="star" onclick="filterByColor('star', this)">
                    <span class="color-dot" style="background: var(--warning);"></span> المفضلين
                </button>
                <button class="color-chip" data-color="whatsapp" onclick="filterByColor('whatsapp', this)">
                    <span class="color-dot" style="background: #25D366;"></span> واتساب
                </button>
                <button class="color-chip" data-color="phone" onclick="filterByColor('phone', this)">
                    <span class="color-dot" style="background: var(--success);"></span> اتصال
                </button>
            </div>
            <div class="search-results" id="searchResults">
                <div class="no-results">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <p>ابدأ البحث عن مرشد</p>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-screen="feed" onclick="switchScreen('feed')">
                <span class="nav-indicator"></span>
                <i class="fa-solid fa-house"></i>
                <span>الرئيسية</span>
            </button>
            <button class="nav-item add-btn" data-screen="add" onclick="openAddModal()">
                <i class="fa-solid fa-circle-plus"></i>
                <span>إضافة</span>
            </button>
            <button class="nav-item" data-screen="search" onclick="switchScreen('search')">
                <i class="fa-solid fa-magnifying-glass"></i>
                <span>بحث</span>
            </button>
        </nav>
    </div>

    <!-- ==================== ADD/EDIT MODAL ==================== -->
    <div id="addModal" class="modal-overlay">
        <div class="modal-sheet">
            <div class="modal-handle"></div>
            <div class="modal-header">
                <h2 id="modalTitle">إضافة مرشد جديد</h2>
                <button class="modal-close" onclick="closeAddModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="addGuideForm" class="modal-form" onsubmit="saveGuide(event)">
                <input type="hidden" id="editGuideId" value="">

                <!-- Dual Image Upload -->
                <label style="font-size: 13px; font-weight: 700; color: var(--text-secondary);">الصور</label>
                <div class="dual-image-upload">
                    <div class="image-upload-area" id="guideImageUpload" onclick="openCloudinaryWidget('guide')">
                        <i class="fa-solid fa-user"></i>
                        <span>صورة المرشد</span>
                        <div class="image-change-badge"><i class="fa-solid fa-camera"></i></div>
                    </div>
                    <div class="image-upload-area" id="vehicleImageUpload" onclick="openCloudinaryWidget('vehicle')">
                        <i class="fa-solid fa-bus"></i>
                        <span>صورة الحافلة</span>
                        <div class="image-change-badge"><i class="fa-solid fa-camera"></i></div>
                    </div>
                </div>

                <!-- Name with Voice -->
                <div class="form-group">
                    <label>اسم المرشد <span style="color: var(--danger);">*</span></label>
                    <div class="voice-input-group">
                        <input type="text" id="guideName" placeholder="أدخل الاسم الكامل" required>
                        <button type="button" class="voice-input-btn" id="nameVoiceBtn" onclick="startNameVoice()" title="إدخال صوتي">
                            <i class="fa-solid fa-microphone"></i>
                        </button>
                    </div>
                </div>

                <!-- Phone -->
                <div class="form-group">
                    <label>رقم الهاتف <span style="color: var(--danger);">*</span></label>
                    <input type="tel" id="guidePhone" placeholder="+216 XX XXX XXX" required dir="ltr">
                </div>

                <!-- License & Language Row -->
                <div class="form-row">
                    <div class="form-group">
                        <label>رقم الرخصة</label>
                        <input type="text" id="guideLicense" placeholder="رقم الرخصة">
                    </div>
                    <div class="form-group">
                        <label>اللغة</label>
                        <select id="guideLanguage">
                            <option value="العربية">العربية</option>
                            <option value="الفرنسية">الفرنسية</option>
                            <option value="الإنجليزية">الإنجليزية</option>
                            <option value="تونسي (دارجة)">تونسي (دارجة)</option>
                            <option value="متعدد اللغات">متعدد اللغات</option>
                        </select>
                    </div>
                </div>

                <!-- Notes -->
                <div class="form-group">
                    <label>ملاحظات</label>
                    <textarea id="guideNotes" placeholder="أي ملاحظات إضافية..."></textarea>
                </div>

                <!-- Delete Confirmation -->
                <div class="delete-confirm" id="deleteConfirm">
                    <p>هل أنت متأكد من حذف هذا المرشد؟</p>
                    <div class="delete-confirm-btns">
                        <button type="button" class="btn-cancel-delete" onclick="cancelDelete()">إلغاء</button>
                        <button type="button" class="btn-confirm-delete" onclick="confirmDelete()">حذف</button>
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit" class="submit-btn" id="submitGuideBtn">
                    <i class="fa-solid fa-check"></i> حفظ المرشد
                </button>

                <!-- Delete Button -->
                <button type="button" class="submit-btn" id="deleteGuideBtn"
                        style="display:none; background: transparent; border: 1.5px solid var(--danger); color: var(--danger); box-shadow: none;"
                        onclick="showDeleteConfirm()">
                    <i class="fa-solid fa-trash"></i> حذف المرشد
